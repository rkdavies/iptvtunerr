# Oracle-cap tuner services.
# The oracle instances (hdhrcap100..hdhrcap600) run as child processes inside the main
# iptvtunerr-supervisor pod — no separate deployment needed.
# These Services expose each oracle instance's port (5201–5206) from the supervisor pod
# under a stable DNS name so Plex can reach each tuner independently.
---
apiVersion: v1
kind: Service
metadata:
  name: iptvtunerr-oracle100
  namespace: plex
spec:
  selector:
    app: iptvtunerr-supervisor
  ports:
    - { name: http, port: 5004, targetPort: 5201, protocol: TCP }
---
