# Manual Endpoints for plex Service when the Plex pod cannot run (e.g. node NotReady).
# Use when Plex is reachable at the host IP (e.g. 192.168.50.85:32400).
# Restore normal Service selector and delete this once the Plex pod runs in-cluster.
apiVersion: v1
kind: Endpoints
metadata:
  name: plex
  namespace: plex
subsets:
  - addresses:
      - ip: 192.168.50.85
    ports:
      - name: http
        port: 32400
        protocol: TCP
