name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X main.Version=${VERSION}"
          mkdir -p dist

          build() {
            local os=$1 arch=$2
            local name="iptv-tunerr-${VERSION}-${os}-${arch}"
            local out="dist/${name}"
            echo "Building ${name}..."
            CGO_ENABLED=0 GOOS=${os} GOARCH=${arch} \
              go build -mod=vendor -ldflags="${LDFLAGS}" \
              -o "${out}" ./cmd/iptv-tunerr
            if [ "${os}" = "windows" ]; then
              mv "${out}" "${out}.exe"
              zip -j "dist/${name}.zip" "${out}.exe"
            else
              tar -czf "dist/${name}.tar.gz" -C dist "${name}"
            fi
            rm -f "${out}" "${out}.exe"
          }

          build linux  amd64
          build linux  arm64
          build darwin amd64
          build darwin arm64
          build windows amd64

          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
